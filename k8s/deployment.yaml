apiVersion: apps/v1
kind: Deployment
metadata:
  name: recylpay-web
  labels:
    app: recylpay-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recylpay-web
  template:
    metadata:
      labels:
        app: recylpay-web
    spec:
      containers:
        - name: recylpay-web
          image: recylpay-web:latest
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              value: "http://recylpay-api-service:3000/api"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: recylpay-web-service
spec:
  selector:
    app: recylpay-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recylpay-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: recylpay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recylpay-web-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: recylpay-api-service
                port:
                  number: 3000
