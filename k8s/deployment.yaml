apiVersion: apps/v1
kind: Deployment
metadata:
  name: recylpay-web
  labels:
    app: recylpay-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recylpay-web
  template:
    metadata:
      labels:
        app: recylpay-web
    spec:
      containers:
        - name: recylpay-web
          image: recylpay-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: recylpay-web-service
spec:
  selector:
    app: recylpay-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
