apiVersion: apps/v1
kind: Deployment
metadata:
  name: recylpay-api
  labels:
    app: recylpay-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recylpay-api
  template:
    metadata:
      labels:
        app: recylpay-api
    spec:
      containers:
        - name: recylpay-api
          image: recylpay-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: recylpay-config
                  key: db_host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: recylpay-config
                  key: db_port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: recylpay-config
                  key: db_name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: recylpay-secret
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recylpay-secret
                  key: db_password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recylpay-secret
                  key: jwt_secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: recylpay-api-service
spec:
  selector:
    app: recylpay-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
